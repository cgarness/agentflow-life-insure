# AgentFlow: Master Software Architecture Report
*A comprehensive technical teardown of the AgentFlow platform, designed to compete with tier-1 CRM/Dialer SaaS applications like GoHighLevel, CallTools, ReadyMode, BatchDialer, and Ringy.*

---

## 1. Executive Summary
AgentFlow is built on a high-performance, real-time shared-database multi-tenant architecture utilizing PostgreSQL via Supabase and a robust React frontend. It employs a **Server-Side Event-Driven model** to achieve extreme parallel scale. By offloading telephony Call Control, Machine Detection (AMD), and queue locking natively to database layers and Edge nodes, the CRM reacts dynamically—providing users an Enterprise-grade 60FPS UI entirely stripped of typical dialer web crashes and memory leaks.

## 2. Competitive Roadmap (SaaS Upgrades)
To solidly beat BatchDialer and GoHighLevel on the front-end, AgentFlow requires these explicit next-step feature builds:
*   **Triple-Line Auto-Dial UI**: Concurrent Outbound Legs visualization for high-speed connectivity.
*   **Kanban Drag-n-Drop Pipeline**: Visually updating lead pipelines instead of just static lists.
*   **Geo-Heatmap Analytics**: Showing area code density conversions across the US map.
*   **Branched Web Scripts**: Allowing managers to build Yes/No dialogue trees natively.

    <script type="text/markdown" id="md-db">
# Module: Database & Data Infrastructure 🗄️

*AgentFlow is built on a high-performance, real-time shared-database multi-tenant architecture utilizing PostgreSQL via Supabase. Every data model is rigorously scoped globally by `organization_id` to ensure strict enterprise data isolation.*

---

### [1] Core Data Domains & Table Structures

The database is divided into three primary functional domains: **Telephony & Dialer**, **CRM & Contact Management**, and **User & Organization Identity**.

#### A. Multi-Tenant Identity Domain
*   **`organizations`**: The root apex tenant identifier. Forms the foundation of our multi-tenant SaaS architecture (mimicking GoHighLevel sub-accounts).
*   **`profiles`**: Stores extended user session data, decoupled from Supabase Auth (`auth.users`) but linked 1:1 via `id`. Utilizes an `ltree` hierarchy model (Path enumeration).
*   **`invitations`**: Manages pending user invites securely.

#### B. Telephony & Dialer Domain (The Engine)
*   **`telnyx_settings`**: Stores encrypted infrastructure credentials, specifically the `call_control_app_id`.
*   **`campaigns`** & **`campaign_leads`**: State machines for the Power Dialer. Uses atomic database locks (`locked_at`) to ensure high-velocity parallel dialing across users without colliding on the same lead.
*   **`calls`**: The immutable transaction ledger for all live calls (`telnyx_call_id`, `duration`, `amd_result`).

#### C. CRM & Contact Domain
*   **`leads`**, **`clients`**, **`recruits`**: Segmented contact types structurally separating different business pipelines natively at the SQL level.
*   **`appointments`**: High-fidelity booking system allowing Google/Outlook syncing.

---

### [2] Row Level Security (RLS) Posture 🛡️

Our RLS strategy is paranoid-mode by default. It guarantees zero cross-tenant data spillage.

**Global Rule: Structural Scoping**
Every table evaluates dynamically against the active authenticated user token bounds strictly by `organization_id`. `Super Admin` bypass is enabled natively by a JWT custom claim `is_super_admin: true`.
    </script>

    <script type="text/markdown" id="md-backend">
# Module: Backend & Telephony Infrastructure ⚙️

*AgentFlow employs a serverless, event-driven backend utilizing Supabase Edge Functions. This design ensures horizontal scalability, zero cold-boot latency for critical operations, and secure bridging between the React frontend and third-party APIs.*

---

### [1] Telephony Control Engine (The Dialer Backend)
AgentFlow uses a **Two-Legged Server-Side Call Control** model rather than legacy browser-only implementations.

#### Edge Function Routing:
*   **`dialer-start-call`**: Triggered by user. Posts to Telnyx to ring the customer first (Leg 1), attaching `premium_answering_machine_detection` constraints globally.
*   **`telnyx-webhook` (The Brain)**: Inbound listener monitoring call state.
    *   *If Machine/Voicemail*: Issues an immediate `.hangup()` command and advances the DB queue without waking the agent's browser.
    *   *If Human Detected*: Executes a `.transfer()` bridge pointing to the agent's localized SIP URI (`sip:{uuid}@sip.telnyx.com`), activating their browser mic immediately.
*   **`dialer-hangup`**: REST termination preventing browser ghost-ringing.

### [2] Advanced Integration Operations
*   **`google-calendar-*`**: Bidirectional polling ensuring exact 1:1 mappings between a CRM booked status and an external Microsoft or Google workspace.
*   **`daily-briefing`**: AI-driven chron jobs scraping yesterday's metrics into conversational recommendations natively mapped into PostgreSQL early morning bounds.
    </script>

# UI/UX Module Analysis: Power Dialer & Telephony 🎧

*This module covers the core outbound mechanics of the SaaS offering.*

---

### [1] Form Structure & Architecture

#### The Active Call Session HUD
*   **Data Used**: Real-time ticker (`sessionElapsed`), appointments set, talk time totals.
*   **Competitive Level-Up**: Add a scrolling ticker showing the organization's "Live Leaderboard" for constant gamification (CallTools style).

#### The Lead Queue Sidebar
*   **Data Used**: Pulled via `getCampaignLeads()` heavily filtered by `useMemo` states evaluating Best Timezones and Attempt counts.
*   **Competitive Level-Up**: Implement **Dynamic Smart Queues** powered by WebSockets. If a hot lead is generated via external Zapier hook, the UI should forcibly push them to index `0` dynamically on the active dialer queue.

#### Wrap-Up & Disposition Modal
*   **Data Used**: Reads `dispositions` settings mapping specific logic behaviors (DNC triggers, mandatory notes).
*   **Competitive Level-Up**: Introduce conditional logical dropdowns. If "Not Interested" is selected, force a sub-reason (Price, Partner, Not Needed).

# UI/UX Module Analysis: CRM Engine (Leads, Clients) 👥

*The structural anchor of AgentFlow.*

---

### [1] The Master Grid (`Contacts.tsx`)
*   **Data Used**: Segmented SQL table lookups (`leads`, `clients`, `recruits`). Implements Mass-action arrays natively.
*   **SaaS Optimization**: A clean React Table is not enough. We must introduce a **Kanban Board Pivot** mapping the SQL statuses into draggable horizontal columns representing aggregated sales pipelines, visually identifying choke points.

### [2] The Context Drawer
*   **Data Used**: Pulls the entirety of a single UUID's activity spread. Centralizes Email, SMS, and Voice histories.
*   **SaaS Optimization**: Integrate Edge-AI sentimental scoring determining "Probability of Close" intelligently by scraping the raw transcript JSON payloads and call outputs sequentially.
    </script>

# UI/UX Module Analysis: Dashboard & Analytics Engine 📊

*Turning raw telephony logs into actionable organizational intelligence.*

---

### [1] KPI & Reporting Metrics
*   **Data Used**: Queries across `agent_scorecards` crossing `calls` tables. Time-boxing via `StartOfDay()` boundary rules per the user's localized timezone configuration natively.
*   **SaaS Optimization**: Provide historical variance mapping. Display (+15% vs Last Week) inherently in mini SVG charts on every status card.

### [2] Advanced Interactions
*   **Leaderboard Engine**: Ranks SDRs globally evaluating raw call volumes vs appointments scheduled.
*   **SaaS Optimization**: Geo-Heatmap overlays. Generate an SVG map of the USA natively shaded by states where conversions index higher against standard deviations dynamically mapping Area Code metrics perfectly.
    </script>

    <script type="text/markdown" id="md-superadmin">
# UI/UX Module: Super Admin Command Center 💻

*The invisible architectural bypass layer utilized entirely by SaaS Operations management.*

---

### [1] Cross-Tenant Visibility
*   **Data Used**: Natively queries the absolute sums of `organizations` bypassing standard `Row Level Security` via explicitly elevated `is_super_admin: true` JWT claims validated natively in `security_definer` functions.
*   **SaaS Optimization**: Embed Stripe API controls inherently into the dashboard to terminate a sub-account's API Telephony capabilities instantly via toggle.

### [2] Impersonation Engine ("View As")
*   **Data Used**: Extracts target `profile` and aggressively mounts an `impersonatedUser` struct into the global React `AuthContext`, overriding `organizationId` boundaries locally while maintaining real user state securely.
*   **SaaS Optimization**: Add **Read-Only Mode** to context impersonation to ensure Operations teams cannot accidentally execute massive POST hooks while debugging a customer's workspace.
    </script>

# System Mapping & Real-Time Interaction Flow 🔄

*How Frontend, Backend, and Database coordinate to execute AgentFlow's value mechanics.*

AgentFlow operates on an Event-Driven, Real-Time loop using **WebSockets** and **Webhooks**.

### The Two-Legged Dialer Orchestration

```mermaid
sequenceDiagram
    participant React as Frontend (React)
    participant Edge as Serverless Edge (dialer-start)
    participant Database as Supabase DB
    participant Telnyx as Telnyx (PSTN)
    participant Webhook as Edge (Webhook)

    Note over React, Edge: Agent clicks "Dial Lead"
    React->>Edge: POST (Lead_Number)
    Edge->>Database: Validate Tenant & Fetch API Key
    Database-->>Edge: Returns App ID
    Edge->>Telnyx: Initiates Call + AMD Flag
    
    Note over Telnyx: The PSTN Ring (Leg 1)
    Telnyx-->>Webhook: Machine/Voicemail Detected!
    Webhook->>Telnyx: POST /hangup (Silent terminate)
    Webhook->>Database: UPDATE calls (duration, status)
    Database-->>React: Realtime Hook (UI advances smoothly)
    
    Note over Telnyx, React: If Human is Detected
    Webhook->>Telnyx: POST /transfer (Bridge)
    Telnyx->>React: Bridges SIP Audio (Leg 2) directly to Headset
```
    </script>
