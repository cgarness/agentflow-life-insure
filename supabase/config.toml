# Twilio user JWT functions — verify_jwt=false: Supabase gateway rejects ES256 access tokens
# (sb-error-code UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM). Each function validates Bearer JWT
# in-code via anon client auth.getUser(jwt), then uses service role for DB.
[functions.twilio-reputation-check]
verify_jwt = false

[functions.twilio-search-numbers]
verify_jwt = false

[functions.twilio-buy-number]
verify_jwt = false

# Twilio webhooks — authenticated via X-Twilio-Signature HMAC-SHA1, not Supabase JWT.
[functions.twilio-voice-webhook]
verify_jwt = false

[functions.twilio-voice-status]
verify_jwt = false

[functions.twilio-voice-inbound]
verify_jwt = false

# Twilio recording status callback — authenticated via X-Twilio-Signature HMAC-SHA1.
# Downloads the recording from Twilio, uploads to call-recordings Storage bucket,
# updates the calls row, and deletes the Twilio copy to avoid storage charges.
[functions.twilio-recording-status]
verify_jwt = false

# Nightly purge of Storage + DB recording fields per org `phone_settings.recording_retention_days`.
# Invoked by pg_cron with `x-cron-secret` matching `RECORDING_RETENTION_CRON_SECRET`.
[functions.recording-retention-purge]
verify_jwt = false

# Twilio subaccount provisioning — invoked by Postgres AFTER INSERT trigger on organizations
# via pg_net (private.twilio_provisioning_config), not by an authenticated user JWT.
[functions.provision-twilio-subaccount]
verify_jwt = false

# Super Admin retry tool for orgs in twilio_subaccount_status='pending'/'pending_manual'.
# JWT validated in-code (ES256 gateway constraint, AGENT_RULES.md §Telephony / Security);
# also enforces is_super_admin via JWT claim AND profiles.is_super_admin server-side.
[functions.retry-twilio-provisioning]
verify_jwt = false

