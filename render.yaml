# AgentFlow AI Testing — OpenAI Realtime Media Streams bridge
# Deploy from repo root; service rootDir points at services/ai-voice-bridge.
#
# CRITICAL: Use a paid always-on instance. Free tier spin-down causes the first
# outbound call after idle to answer with silence while the container cold-starts.

services:
  - type: web
    name: ai-voice-bridge
    runtime: node
    rootDir: services/ai-voice-bridge
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_VOICE_BRIDGE_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      # Render sets PORT automatically for web services.

  # AI Testing only — Hypercheap Voice Agent (Fennec ASR → OpenRouter LLM →
  # Inworld TTS). Separate always-on Python service; provider keys live here only.
  - type: web
    name: hypercheap-voice-bridge
    runtime: python
    rootDir: services/hypercheap-voice-bridge
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: FENNEC_API_KEY
        sync: false
      - key: FENNEC_WS_URL
        sync: false
      - key: FENNEC_SAMPLE_RATE
        value: "16000"
      - key: FENNEC_CHANNELS
        value: "1"
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DEEPGRAM_FLUX_MODEL
        value: flux-general-en
      - key: DEEPGRAM_FLUX_SAMPLE_RATE
        value: "16000"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: google/gemini-2.0-flash-001
      - key: OPENROUTER_SITE_URL
        value: https://app.agentflowcrm.com
      - key: OPENROUTER_APP_NAME
        value: AgentFlow
      - key: INWORLD_API_KEY
        sync: false
      - key: INWORLD_MODEL_ID
        value: inworld-tts-1
      - key: INWORLD_VOICE_ID
        sync: false
      - key: INWORLD_SAMPLE_RATE
        value: "48000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Render sets PORT automatically for web services.
